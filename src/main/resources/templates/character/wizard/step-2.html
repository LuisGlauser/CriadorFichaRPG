<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Passo 2 — Raça e Background</title>
    <link rel="stylesheet" th:href="@{/css/wizard.css}" />
</head>
<body>

<form th:action="@{/character/create/step-2}" th:object="${character}" method="post">

    <div class="step-progress">
        <div class="step-dot done">✓</div>
        <div class="step-dot active">2</div>
        <div class="step-dot">3</div>
        <div class="step-dot">4</div>
        <div class="step-dot">5</div>
        <div class="step-dot">6</div>
    </div>

    <h1>🌍 Escolha sua Raça</h1>

    <div class="card-container">
        <div th:each="s : ${speciesList}">
            <label class="card">
                <input type="radio" th:field="*{speciesId}" th:value="${s.id}" />
                <h3 th:text="${s.name}">Raça</h3>
            </label>
        </div>
    </div>

    <hr>

    <h1>📜 Escolha seu Background</h1>

    <div class="card-container">
        <div th:each="b : ${backgroundList}">
            <label class="card">
                <input type="radio" th:field="*{backgroundId}" th:value="${b.id}" />
                <h3 th:text="${b.name}">Background</h3>
            </label>
        </div>
    </div>

    <div class="button-row">
        <button type="submit">Próximo →</button>
        <button type="button" onclick="debug()">Debug</button>
    </div>

</form>

<script>
    function debug() {
        const data = new FormData(document.querySelector('form'));
        for (let [key, value] of data.entries()) console.log(key, value);
    }

    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', () => {
            const name = radio.name;
            document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                r.closest('.card').classList.remove('selected');
            });
            radio.closest('.card').classList.add('selected');
        });
    });
</script>

</body>
</html>
